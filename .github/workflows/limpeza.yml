name: Limpeza Total de Runs
on:
  workflow_dispatch:

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Deletar todas as runs via GitHub CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run delete --all --repo ${{ github.repository }}