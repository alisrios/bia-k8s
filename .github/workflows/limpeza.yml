name: Limpeza Total de Runs
on:
  workflow_dispatch:

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Deletar todas as runs via Script CLI
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }} # <--- Aqui está a mágica que faltava!
        run: |
          gh run list --limit 1000 --json databaseId --jq '.[].databaseId' | xargs -I{} gh run delete {}