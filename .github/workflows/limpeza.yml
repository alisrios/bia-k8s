name: Limpeza Total de Runs
on:
  workflow_dispatch:

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write # Permissão crucial para deletar
    steps:
      - name: Delete workflow runs
        uses: Mattraiano/delete-workflow-runs@v2.0.6
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0